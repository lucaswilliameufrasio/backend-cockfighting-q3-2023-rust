name: benchmark

on:
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build Docker images
        run: docker compose -f docker-compose.test.yml build

      - name: Start services
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" "http://localhost:8080/health-check" | grep -q 200; then
              echo "API ready!"
              exit 0
            fi
            echo "waiting... $i"
            sleep 2
          done
          exit 1

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run k6 benchmark
        run: k6 run benchmark.js --out json=/tmp/k6-results.json

      - name: Stop services
        run: docker compose -f docker-compose.test.yml down -v

      - name: Print summary
        run: |
          echo "## k6 Benchmark Results" >> $GITHUB_STEP_SUMMARY
          jq -r '.metrics |
            "| \(.name) | \(.type) | \(.value // empty) |"' /tmp/k6-results.json 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
